<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Fondo rojo institucional Punto Rojo -->
  <rect width="1024" height="1024" fill="#C8141C"/>

  <!-- Sutil patron de luz para profundidad (no se nota en sizes chicos pero da textura en grandes) -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#E83A40" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9F0F16" stop-opacity="0"/>
    </radialGradient>
    <filter id="ringShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Anillo blanco caracteristico (el "anillo" del logo Punto Rojo) -->
  <circle cx="512" cy="512" r="280"
          fill="none" stroke="#FFFFFF" stroke-width="68"
          filter="url(#ringShadow)"/>

  <!-- Punto rojo centrado dentro del anillo (jugando con el nombre Punto Rojo) -->
  <circle cx="512" cy="512" r="98" fill="#C8141C"/>

  <!-- Reflejo blanco minimal en el punto para darle vida -->
  <ellipse cx="478" cy="475" rx="34" ry="22" fill="#FFFFFF" opacity="0.18"/>
</svg>
