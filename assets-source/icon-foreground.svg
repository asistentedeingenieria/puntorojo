<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Foreground del adaptive icon de Android — solo el dibujo, sin fondo.
       Android compone esto sobre el background-color que indique el config.
       Mantenemos un padding generoso (~25%) porque Android puede recortar
       hasta 33% en la mascara dinamica del sistema. -->

  <!-- Anillo blanco mas chico que el del icon principal (para que sobreviva el crop) -->
  <circle cx="512" cy="512" r="220"
          fill="none" stroke="#FFFFFF" stroke-width="56"/>

  <!-- Punto rojo centrado -->
  <circle cx="512" cy="512" r="78" fill="#C8141C"/>

  <!-- Reflejo blanco minimal -->
  <ellipse cx="485" cy="483" rx="26" ry="17" fill="#FFFFFF" opacity="0.18"/>
</svg>
