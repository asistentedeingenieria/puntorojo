<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <!-- Splash screen — fondo dark institucional con logo centrado. -->
  <rect width="2732" height="2732" fill="#0F172A"/>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1F2937" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8141C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8141C" stop-opacity="0"/>
    </radialGradient>
    <filter id="ringShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="2732" height="2732" fill="url(#bgGlow)"/>
  <circle cx="1366" cy="1366" r="700" fill="url(#redGlow)"/>

  <!-- Logo centrado: anillo + punto rojo -->
  <circle cx="1366" cy="1366" r="280"
          fill="none" stroke="#FFFFFF" stroke-width="56"
          filter="url(#ringShadow)"/>
  <circle cx="1366" cy="1366" r="98" fill="#C8141C"/>
  <ellipse cx="1338" cy="1340" rx="32" ry="20" fill="#FFFFFF" opacity="0.22"/>

  <!-- Texto debajo del logo -->
  <text x="1366" y="1820"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="120" font-weight="900"
        letter-spacing="14" fill="#FFFFFF">PUNTO ROJO</text>
  <text x="1366" y="1900"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="40" font-weight="600"
        letter-spacing="10" fill="#94A3B8">GESTION DE OBRA</text>
</svg>
