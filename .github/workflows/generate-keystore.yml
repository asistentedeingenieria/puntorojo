name: Generate Android Keystore (one-time)

# ════════════════════════════════════════════════════════════════
# Workflow PARA CORRER UNA SOLA VEZ.
# Genera un keystore .jks + passphrase aleatoria para firmar
# AABs antes de subir a Google Play Store.
#
# DESPUES DE CORRERLO:
# 1. Descargar el artifact "puntorojo-keystore-bundle"
# 2. Descomprimir el ZIP
# 3. Abrir keystore-info.txt (tiene los valores que necesitas)
# 4. Crear los 4 secrets en GitHub:
#    Settings -> Secrets and variables -> Actions -> New repository secret
#    Nombres exactos:
#      - ANDROID_KEYSTORE_BASE64       (valor: contenido base64 del .keystore)
#      - ANDROID_KEYSTORE_PASSWORD     (valor: el storePassword del txt)
#      - ANDROID_KEY_ALIAS             (valor: el alias del txt — siempre "puntorojo")
#      - ANDROID_KEY_PASSWORD          (valor: el keyPassword del txt — igual al storePassword)
# 5. GUARDAR EL KEYSTORE.JKS EN UN LUGAR SEGURO (1Password, Bitwarden,
#    USB encriptado). Si lo perdes, Google Play NO acepta updates.
# 6. Borrar este workflow del repo (ya no lo necesitas)
#
# IMPORTANTE: el keystore + passphrase quedan en el artifact de GitHub
# por 7 dias. Despues se borran automaticamente. Bajalo cuanto antes.
# ════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribir GENERAR para confirmar (esto sobreescribe cualquier keystore previo si existiera)'
        required: true
        type: string

jobs:
  generate:
    name: Generate keystore
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify confirmation input
        run: |
          if [ "${{ inputs.confirm }}" != "GENERAR" ]; then
            echo "::error::Tenes que escribir exactamente la palabra GENERAR para confirmar"
            exit 1
          fi

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate random strong passphrase
        id: gen_pass
        run: |
          # 32 chars alphanumeric — fuerte sin caracteres raros que rompan shells
          PASS=$(openssl rand -base64 32 | tr -d '+/=' | head -c 32)
          echo "::add-mask::$PASS"
          echo "pass=$PASS" >> $GITHUB_OUTPUT

      - name: Create keystore with keytool
        env:
          PASS: ${{ steps.gen_pass.outputs.pass }}
        run: |
          mkdir -p out

          # Genera un keystore tipo PKCS12 (estandar moderno).
          # validity 25000 dias = ~68 anos (Google Play recomienda al menos 25 anos).
          # CN, OU, O = info de tu empresa (cambialo si queres en futuro).
          keytool -genkeypair \
            -v \
            -keystore out/puntorojo-release.keystore \
            -storetype PKCS12 \
            -alias puntorojo \
            -keyalg RSA \
            -keysize 2048 \
            -validity 25000 \
            -storepass "$PASS" \
            -keypass "$PASS" \
            -dname "CN=Punto Rojo, OU=Tablayeso, O=Punto Rojo S.A., L=Guatemala City, ST=Guatemala, C=GT"

          echo "Keystore generado: $(ls -la out/puntorojo-release.keystore)"

      - name: Generate base64 of keystore
        run: |
          base64 -w 0 out/puntorojo-release.keystore > out/keystore.base64.txt
          echo "Base64 generado: $(wc -c < out/keystore.base64.txt) chars"

      - name: Create human-readable info file
        env:
          PASS: ${{ steps.gen_pass.outputs.pass }}
        run: |
          cat > out/keystore-info.txt <<EOF
          ════════════════════════════════════════════════════════════════
          PUNTO ROJO · ANDROID RELEASE KEYSTORE
          Generado: $(date -u "+%Y-%m-%d %H:%M:%S UTC")
          ════════════════════════════════════════════════════════════════

          ESTOS SON LOS 4 VALORES QUE TENES QUE COPIAR COMO SECRETS EN
          GitHub → Settings → Secrets and variables → Actions →
          → New repository secret

          ──────────────────────────────────────────────────────────────
          1) ANDROID_KEYSTORE_BASE64
          (copiar TODO el contenido del archivo keystore.base64.txt
           que esta en este mismo zip)
          ──────────────────────────────────────────────────────────────

          ──────────────────────────────────────────────────────────────
          2) ANDROID_KEYSTORE_PASSWORD
          $PASS
          ──────────────────────────────────────────────────────────────

          ──────────────────────────────────────────────────────────────
          3) ANDROID_KEY_ALIAS
          puntorojo
          ──────────────────────────────────────────────────────────────

          ──────────────────────────────────────────────────────────────
          4) ANDROID_KEY_PASSWORD
          $PASS
          ──────────────────────────────────────────────────────────────


          ⚠️  IMPORTANTE — GUARDAR OFFLINE:
          - Este zip se borra de GitHub en 7 dias automaticamente.
          - Guarda el archivo puntorojo-release.keystore en un password
            manager (1Password, Bitwarden) o USB encriptado.
          - Tambien guarda este keystore-info.txt para tener la passphrase.
          - Si perdes este keystore, Google Play NO acepta updates de la
            app. Tendrias que publicar la app de cero (con otro
            applicationId) o pedirle a Google Play que rote la key
            (proceso largo).

          ✅ DESPUES DE CONFIGURAR LOS 4 SECRETS:
          - Volve a la pestana Actions del repo
          - Trigger el workflow "Build Android AAB" (boton "Run workflow")
          - El AAB firmado va a aparecer como artifact al terminar
          - Descargalo y subilo a Google Play Console
          ════════════════════════════════════════════════════════════════
          EOF

          echo "Info file creado"
          # NO mostrar contenido en logs (tiene la passphrase)
          ls -la out/

      - name: Upload keystore bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: puntorojo-keystore-bundle
          path: |
            out/puntorojo-release.keystore
            out/keystore.base64.txt
            out/keystore-info.txt
          retention-days: 7
          if-no-files-found: error

      - name: Done
        run: |
          echo "## Keystore generado correctamente" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Bajar el artifact **puntorojo-keystore-bundle** de esta pagina" >> $GITHUB_STEP_SUMMARY
          echo "2. Descomprimir, abrir **keystore-info.txt**" >> $GITHUB_STEP_SUMMARY
          echo "3. Crear los 4 secrets en Settings → Secrets and variables → Actions" >> $GITHUB_STEP_SUMMARY
          echo "4. Guardar el .keystore offline (password manager / USB)" >> $GITHUB_STEP_SUMMARY
          echo "5. Borrar este workflow del repo (ya no es necesario)" >> $GITHUB_STEP_SUMMARY
