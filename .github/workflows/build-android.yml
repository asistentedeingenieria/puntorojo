name: Build Android AAB

# Cuando correr este workflow:
#   - Cuando se hace push a main y cambian archivos relevantes de Android
#   - Manualmente desde la pestana Actions de GitHub
on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'package-lock.json'
      - 'public/**'
      - 'assets-source/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    # Permite triggear manualmente con un boton "Run workflow"

jobs:
  build:
    name: Build signed AAB
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup JDK 21 (Android Gradle Plugin 8+)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore from secret
        # El secret ANDROID_KEYSTORE_BASE64 contiene el .keystore convertido a base64.
        # Si esta vacio (todavia no se subio), el step no hace nada y gradle firma con debug.
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret is empty — release build will be unsigned"
            exit 0
          fi
          echo "Length of base64 secret: ${#KEYSTORE_BASE64} chars"
          # printf evita el newline trailing que echo agrega.
          # tr -d limpia cualquier whitespace (espacios, tabs, newlines) que se haya
          # colado al copiar/pegar el secret, antes de pasar a base64 -d.
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > android/app/puntorojo-release.keystore
          if [ ! -s android/app/puntorojo-release.keystore ]; then
            echo "::error::Failed to decode keystore (output is empty). Check that ANDROID_KEYSTORE_BASE64 secret is the correct base64 string from keystore.base64 file."
            exit 1
          fi
          ls -la android/app/puntorojo-release.keystore
          # Verificar que el archivo es un keystore valido (PKCS12)
          file android/app/puntorojo-release.keystore || true
          echo "Keystore decoded successfully ($(wc -c < android/app/puntorojo-release.keystore) bytes)"

      - name: Build AAB (release)
        env:
          ANDROID_KEYSTORE_PATH: puntorojo-release.keystore
          RAW_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RAW_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RAW_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: android
        run: |
          chmod +x ./gradlew
          # Limpia cualquier whitespace que se haya colado al pegar los secrets
          # en GitHub (newlines, espacios, tabs). Sin esto, una password con un
          # \r\n al final hace que Java rechace el keystore como "password incorrect".
          export ANDROID_KEYSTORE_PASSWORD=$(printf '%s' "$RAW_STORE_PASS" | tr -d '[:space:]')
          export ANDROID_KEY_ALIAS=$(printf '%s' "$RAW_KEY_ALIAS" | tr -d '[:space:]')
          export ANDROID_KEY_PASSWORD=$(printf '%s' "$RAW_KEY_PASS" | tr -d '[:space:]')
          # Diagnostico: mostrar longitudes (sin imprimir las passwords mismas)
          echo "Length of cleaned ANDROID_KEYSTORE_PASSWORD: ${#ANDROID_KEYSTORE_PASSWORD}"
          echo "Length of cleaned ANDROID_KEY_ALIAS: ${#ANDROID_KEY_ALIAS}"
          echo "Length of cleaned ANDROID_KEY_PASSWORD: ${#ANDROID_KEY_PASSWORD}"
          if [ "${#ANDROID_KEYSTORE_PASSWORD}" -lt 8 ]; then
            echo "::error::ANDROID_KEYSTORE_PASSWORD is too short (or empty). Re-paste from keystore-info.txt"
            exit 1
          fi
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Find generated AAB
        id: find_aab
        run: |
          AAB_PATH=$(find android/app/build/outputs/bundle -name "*.aab" -print -quit)
          echo "Found AAB at: $AAB_PATH"
          echo "aab_path=$AAB_PATH" >> $GITHUB_OUTPUT

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: puntorojo-release-aab
          path: ${{ steps.find_aab.outputs.aab_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Build APK (debug, para testing en celular)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Find generated APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" -print -quit)
          echo "Found APK at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact (para test en cel)
        uses: actions/upload-artifact@v4
        with:
          name: puntorojo-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        run: |
          echo "## Build OK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**AAB (para Play Store):** \`${{ steps.find_aab.outputs.aab_path }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK (para testing local):** \`${{ steps.find_apk.outputs.apk_path }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Descarga los artifacts desde la pestana 'Artifacts' al final de esta pagina." >> $GITHUB_STEP_SUMMARY
