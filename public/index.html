<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Punto Rojo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#0F172A;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;align-items:center;justify-content:center;
  text-align:center;padding:40px 28px;
  -webkit-font-smoothing:antialiased;
}
.box{max-width:380px}
.dot{
  width:80px;height:80px;border-radius:50%;
  background:#C8141C;margin:0 auto 28px;
  box-shadow:0 8px 32px rgba(200,20,28,.45);
  animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.08);opacity:.85}
}
h1{
  font-size:22px;font-weight:800;letter-spacing:1.4px;
  text-transform:uppercase;margin-bottom:10px;color:#fff;
}
p{
  font-size:14px;line-height:1.6;color:rgba(255,255,255,.75);
  letter-spacing:.3px;margin-bottom:24px;
}
.tag{
  display:inline-block;font-size:10px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;
  background:rgba(200,20,28,.18);color:#FCE6E7;
  padding:6px 14px;border-radius:18px;
  border:1px solid rgba(200,20,28,.4);margin-bottom:20px;
}
.retry{
  display:inline-block;background:#C8141C;color:#fff;
  text-decoration:none;border:none;cursor:pointer;
  padding:14px 32px;border-radius:10px;
  font-family:inherit;font-size:12px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;
  box-shadow:0 6px 20px rgba(200,20,28,.4);
  transition:transform .12s,box-shadow .12s;
}
.retry:active{transform:translateY(1px);box-shadow:0 3px 10px rgba(200,20,28,.3)}
.foot{
  margin-top:32px;font-size:9px;letter-spacing:2px;
  color:rgba(255,255,255,.4);text-transform:uppercase;
}
</style>
</head>
<body>
<div class="box">
  <div class="dot"></div>
  <span class="tag">Punto Rojo</span>
  <h1>Sin conexion a Internet</h1>
  <p>La aplicacion necesita conectarse para mostrar la informacion mas reciente. Verificar la conexion a Internet del dispositivo y reintentar.</p>
  <button class="retry" onclick="window.location.href='https://puntorojo.app'">Reintentar</button>
  <div class="foot">v1.0 · Capacitor wrapper</div>
</div>
<script>
// Auto-reintento cuando vuelve la conexion
window.addEventListener('online', function(){
  window.location.href = 'https://puntorojo.app';
});
// Si ya hay internet al cargar, redirigir directo
if (navigator.onLine) {
  setTimeout(function(){
    window.location.href = 'https://puntorojo.app';
  }, 800);
}
</script>
</body>
</html>
