<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCbfWmw9kAFG73tv94H2Dg-uqHwu6vFaAE",
  authDomain: "punto-rojo-3fcf1.firebaseapp.com",
  projectId: "punto-rojo-3fcf1",
  storageBucket: "punto-rojo-3fcf1.firebasestorage.app",
  messagingSenderId: "1030321339912",
  appId: "1:1030321339912:web:38259c3135c9a2700a5bbd"
};

/* IMPORTANTE: usamos un app NOMBRADO ('clientesPortal') aparte del default.
   Esto AISLA la sesión de Firebase Auth del portal cliente respecto a la
   app interna (puntorojo.html). Sin esto, hacer login en el portal cliente
   pisaba la sesión de admin/supervisor en la app interna. */
const CLIENTES_APP_NAME = 'clientesPortal';
let _clientesApp, _clientesAuth, _clientesDb;
try {
  // Si ya existe (recarga rápida), reutilizamos. Si no, inicializamos.
  try { _clientesApp = firebase.app(CLIENTES_APP_NAME); }
  catch(e) { _clientesApp = firebase.initializeApp(FIREBASE_CONFIG, CLIENTES_APP_NAME); }
  _clientesAuth = _clientesApp.auth();
  _clientesDb = _clientesApp.firestore();
  _clientesAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{});
} catch(e) { console.error('Firebase init error:', e); }
</script>

<style>
:root {
  --red: #C8141C;
  --red-dark: #9F1015;
  --cafe: #6E5032;
  --ink: #1F1F1F;
  --text: #3A3A3A;
  --mute: #6E6E6E;
  --line: #E5E2DC;
  --line-soft: #F0EEE8;
  --cream: #F8F5EF;
  --white: #FFFFFF;
  --paper: #FAF8F3;
  --green-dark: #1E6B1E;
  --amber: #B07020;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--paper);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ════════ LAYOUT BASE ════════ */
.app-header {
  background: var(--white);
  border-bottom: 1px solid var(--line);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.app-header img.logo {
  width: 38px; height: 38px;
  border-radius: 4px;
  background: var(--red);
  padding: 4px;
}
.app-header .title {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink);
}
.app-header .title small {
  display: block;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--mute);
  font-weight: 600;
  margin-top: 2px;
}
.app-header .user-info {
  font-size: 11px;
  color: var(--ink);
  font-weight: 600;
  text-align: right;
}
.app-header .user-info small {
  display: block;
  font-size: 9px;
  color: var(--mute);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

main { padding: 20px 24px 40px; max-width: 1100px; margin: 0 auto; }

/* ════════ BOTONES ════════ */
.btn {
  background: var(--red);
  color: #fff;
  border: 1px solid var(--red);
  padding: 10px 18px;
  font-size: 11px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  font-weight: 700;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.btn:hover { background: var(--red-dark); border-color: var(--red-dark); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn.ghost {
  background: transparent;
  color: var(--text);
  border-color: var(--line);
}
.btn.ghost:hover { background: var(--cream); color: var(--ink); border-color: var(--mute); }
.btn.cafe { background: var(--ink); border-color: var(--ink); color: #fff; }
.btn.sm { padding: 6px 10px; font-size: 10px; letter-spacing: 1px; }

/* ════════ LOGIN / REGISTRO ════════ */
.auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.auth-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 36px 32px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 4px 20px rgba(0,0,0,.05);
}
.auth-card .logo-big {
  width: 64px; height: 64px;
  background: var(--red);
  border-radius: 8px;
  margin: 0 auto 18px;
  display: block;
  padding: 10px;
}
.auth-card h1 {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  margin: 0 0 4px;
  letter-spacing: -.3px;
}
.auth-card .subtitle {
  text-align: center;
  font-size: 11px;
  color: var(--mute);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 22px;
}
.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--mute);
  font-weight: 600;
  margin-bottom: 5px;
}
.field input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 3px;
  font-size: 13px;
  font-family: inherit;
  color: var(--ink);
  background: var(--paper);
  outline: none;
  transition: border-color .15s;
}
.field input:focus { border-color: var(--red); background: var(--white); }
.field input.code-input {
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 700;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  text-align: center;
}
.auth-error {
  background: #FEE2E2;
  border-left: 3px solid var(--red);
  padding: 10px 14px;
  font-size: 11px;
  color: var(--red-dark);
  margin: 12px 0;
  border-radius: 3px;
  letter-spacing: .3px;
  display: none;
}
.auth-error.show { display: block; }
.auth-success {
  background: #DCFCE7;
  border-left: 3px solid var(--green-dark);
  padding: 10px 14px;
  font-size: 11px;
  color: var(--green-dark);
  margin: 12px 0;
  border-radius: 3px;
  letter-spacing: .3px;
  display: none;
}
.auth-success.show { display: block; }
.auth-actions {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.auth-actions .btn { width: 100%; padding: 12px; font-size: 12px; }
.auth-toggle {
  text-align: center;
  margin-top: 16px;
  font-size: 11px;
  color: var(--mute);
}
.auth-toggle a {
  color: var(--red);
  text-decoration: none;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .5px;
}
.auth-toggle a:hover { text-decoration: underline; }

/* ════════ PROYECTO SELECTOR ════════ */
.project-bar {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.project-bar label {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--mute);
  font-weight: 700;
}
.project-bar select {
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 3px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  background: var(--paper);
  color: var(--ink);
  flex: 1;
  min-width: 200px;
}

/* ════════ KPIs ════════ */
.kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 18px;
}
.kpi {
  background: var(--white);
  border: 1px solid var(--line);
  border-left: 3px solid var(--red);
  border-radius: 3px;
  padding: 12px 14px;
}
.kpi .lbl {
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--mute);
  font-weight: 700;
  margin-bottom: 4px;
}
.kpi .val {
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -.5px;
}
.kpi .sub {
  font-size: 9px;
  color: var(--mute);
  margin-top: 4px;
  letter-spacing: .5px;
}
.kpi.green { border-left-color: var(--green-dark); }
.kpi.green .val { color: var(--green-dark); }
.kpi.amber { border-left-color: var(--amber); }
.kpi.amber .val { color: var(--amber); }

/* ════════ TORRES / NIVELES / APTOS ════════ */
.tower-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 4px;
  margin-bottom: 12px;
  overflow: hidden;
}
.tower-head {
  background: var(--white);
  border-left: 4px solid var(--red);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  user-select: none;
}
.tower-head:hover { background: var(--cream); }
.tower-head.open { background: var(--cream); border-bottom: 1px solid var(--line); }
.tower-head .chev {
  width: 9px; height: 9px;
  border-right: 1.5px solid var(--red);
  border-bottom: 1.5px solid var(--red);
  transform: rotate(-45deg);
  transition: transform .25s;
  margin-right: 6px;
}
.tower-head.open .chev { transform: rotate(45deg); }
.tower-head .name {
  flex: 1;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -.3px;
}
.tower-head .pct {
  font-size: 22px;
  font-weight: 700;
  color: var(--red);
  text-align: right;
  letter-spacing: -.5px;
}
.tower-head .pct small {
  display: block;
  font-size: 8px;
  color: var(--mute);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
  font-weight: 600;
}

.level-card {
  margin: 8px 14px;
  background: var(--cream);
  border: 1px solid var(--line);
  border-radius: 4px;
  overflow: hidden;
}
.level-head {
  padding: 8px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}
.level-head:hover { background: var(--line-soft); }
.level-head .chev {
  width: 8px; height: 8px;
  border-right: 1.5px solid var(--red);
  border-bottom: 1.5px solid var(--red);
  transform: rotate(-45deg);
  transition: transform .25s;
}
.level-head.open .chev { transform: rotate(45deg); }
.level-head .name {
  flex: 1;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--red);
  font-weight: 700;
}
.level-head .stat {
  font-size: 10px;
  color: var(--mute);
  font-weight: 600;
}

.aptos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px;
  padding: 8px 12px 12px;
}
.apto-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 10px 14px;
}
.apto-card .apto-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 2px;
}
.apto-card .apto-meta {
  font-size: 9px;
  color: var(--mute);
  letter-spacing: .5px;
  margin-bottom: 8px;
}
.apto-card .acuse-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 6px 0;
  border-top: 1px solid var(--line-soft);
  font-size: 11px;
}
.apto-card .acuse-row:first-of-type { border-top: 0; }
.apto-card .acuse-label {
  font-size: 10px;
  color: var(--ink);
  font-weight: 600;
  letter-spacing: .3px;
}
.apto-card .acuse-status {
  font-size: 9px;
  color: var(--mute);
  letter-spacing: .5px;
  margin-top: 2px;
}
.apto-card .acuse-status.firmado { color: var(--green-dark); font-weight: 700; }
.apto-card .acuse-status.pendiente { color: var(--mute); }

/* ════════ MODAL ════════ */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 100;
  padding: 20px;
  align-items: center;
  justify-content: center;
  overflow-y: auto;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--white);
  border-radius: 6px;
  max-width: 720px;
  width: 100%;
  padding: 28px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  margin: 0 0 4px;
  letter-spacing: -.2px;
}
.modal .desc {
  font-size: 11px;
  color: var(--mute);
  letter-spacing: .5px;
  margin: 0 0 18px;
}
.modal-actions {
  margin-top: 20px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  flex-wrap: wrap;
}

/* ════════ EMPTY STATE ════════ */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--mute);
}
.empty .big {
  font-size: 24px;
  color: var(--mute);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 14px;
}
.empty p {
  font-size: 12px;
  letter-spacing: .5px;
}

/* ════════ TOAST ════════ */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: #fff;
  padding: 12px 20px;
  border-radius: 4px;
  font-size: 11px;
  letter-spacing: 1px;
  font-weight: 700;
  text-transform: uppercase;
  z-index: 200;
  display: none;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
}
.toast.show { display: block; }
.toast.green { background: var(--green-dark); }
.toast.red { background: var(--red); }

/* ════════ DETALLE ACUSE ════════ */
.acuse-detail-fotos {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 14px 0;
}
.acuse-detail-fotos img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid var(--line);
}
.acuse-detail-firma {
  background: var(--cream);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 14px;
  margin: 14px 0;
}
.acuse-detail-firma img {
  max-height: 80px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 4px;
  display: block;
  margin: 8px auto 0;
}
.acuse-detail-meta {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 14px;
  font-size: 11px;
  margin-top: 12px;
}
.acuse-detail-meta dt {
  font-weight: 700;
  color: var(--mute);
  letter-spacing: .5px;
  text-transform: uppercase;
  font-size: 10px;
}
.acuse-detail-meta dd { margin: 0; color: var(--ink); }

@media (max-width: 600px) {
  main { padding: 14px; }
  .app-header { padding: 12px 14px; }
  .app-header .title { font-size: 12px; }
  .app-header .user-info { font-size: 10px; }
  .acuse-detail-fotos { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ════════ SCREEN: LOGIN ════════ -->
<div id="screenLogin" class="auth-screen">
  <div class="auth-card">
    <img src="logo.png" alt="Punto Rojo" class="logo-big" style="width:80px;height:80px;object-fit:contain;background:#fff;border-radius:8px;padding:8px;display:block;margin:0 auto 18px">
    <h1>PORTAL CLIENTE</h1>
    <div class="subtitle">SUBCONTRATISTA TABLAYESO GT</div>

    <form id="loginForm" onsubmit="event.preventDefault(); doLogin();">
      <div class="field">
        <label>Email</label>
        <input id="loginEmail" type="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input id="loginPassword" type="password" autocomplete="current-password" required>
      </div>
      <div id="loginError" class="auth-error"></div>
      <div class="auth-actions">
        <button type="submit" class="btn">INICIAR SESIÓN</button>
      </div>
    </form>
    <div class="auth-toggle">
      <a onclick="showRegister()">¿Tenés un código de invitación? Registrate</a>
    </div>
  </div>
</div>

<!-- ════════ SCREEN: REGISTRO CON CÓDIGO ════════ -->
<div id="screenRegister" class="auth-screen" style="display:none">
  <div class="auth-card">
    <img src="logo.png" alt="Punto Rojo" class="logo-big" style="width:80px;height:80px;object-fit:contain;background:#fff;border-radius:8px;padding:8px;display:block;margin:0 auto 18px">
    <h1>REGISTRO CON CÓDIGO</h1>
    <div class="subtitle">SUBCONTRATISTA TABLAYESO GT</div>

    <form id="registerForm" onsubmit="event.preventDefault(); doRegister();">
      <div class="field">
        <label>Código de Invitación</label>
        <input id="regCode" class="code-input" placeholder="PR-XXXX-XXXX" maxlength="14" required>
      </div>
      <div class="field">
        <label>Tu Email</label>
        <input id="regEmail" type="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label>Crear Contraseña (mín. 6 caracteres)</label>
        <input id="regPassword" type="password" autocomplete="new-password" minlength="6" required>
      </div>
      <div class="field">
        <label>Confirmar Contraseña</label>
        <input id="regPassword2" type="password" autocomplete="new-password" minlength="6" required>
      </div>
      <div id="registerError" class="auth-error"></div>
      <div id="registerSuccess" class="auth-success"></div>
      <div class="auth-actions">
        <button type="submit" class="btn">CREAR CUENTA</button>
      </div>
    </form>
    <div class="auth-toggle">
      <a onclick="showLogin()">Ya tengo cuenta — Iniciar sesión</a>
    </div>
  </div>
</div>

<!-- ════════ SCREEN: APP PRINCIPAL ════════ -->
<div id="screenMain" style="display:none">
  <header class="app-header">
    <img src="logo.png" alt="Punto Rojo" style="width:42px;height:42px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:4px;padding:4px;flex-shrink:0">
    <div class="title">
      PORTAL CLIENTE
      <small>SUBCONTRATISTA TABLAYESO GT</small>
    </div>
    <div class="user-info">
      <span id="userName">—</span>
      <small id="userRole">—</small>
    </div>
    <button class="btn ghost sm" onclick="doLogout()">SALIR</button>
  </header>
  <main>
    <div id="projectBar" class="project-bar" style="display:none">
      <label>Proyecto</label>
      <select id="projectSelect" onchange="onProjectChange()"></select>
    </div>
    <div id="kpis" class="kpis"></div>
    <div id="appContent"></div>
  </main>
</div>

<!-- ════════ MODAL: DETALLE ACUSE ════════ -->
<div id="modalAcuse" class="modal-bg" onclick="if(event.target===this)closeModal('Acuse')">
  <div class="modal">
    <h3 id="acuseTitle">Acuse de Recepción</h3>
    <p class="desc" id="acuseSubtitle"></p>
    <div id="acuseBody"></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal('Acuse')">CERRAR</button>
      <button class="btn" id="btnDescargarAcusePdf" onclick="descargarAcusePDF()">DESCARGAR PDF</button>
    </div>
  </div>
</div>

<!-- ════════ TOAST ════════ -->
<div id="toast" class="toast"></div>

<script>
/* ════════════════════════════════════════════════════════════════════════════
   PORTAL CLIENTE — PUNTO ROJO
   App separada (clientes.puntorojo.app) que comparte el mismo Firebase backend
   con la app interna (puntorojo.app). Solo lectura: muestra al cliente sus
   acuses firmados (con fotos + firma) y le permite descargarlos como PDF.
   ════════════════════════════════════════════════════════════════════════════ */

// ── ESTADO GLOBAL ──
let state = null;            // state remoto (de Firestore appState/main)
let currentUser = null;       // usuario Firebase actual (cliente)
let currentReceptor = null;   // receptor vinculado por email
let activeProjectId = null;
let _stateUnsubscribe = null;
let _viewAcuseCtx = null;

const ACUSE_SLOTS = [
  { key: '0', label: 'ETAPA 1 · ESTRUCTURA' },
  { key: '1', label: 'ETAPA 2 · PRIMERA CARA' },
  { key: '2', label: 'ETAPA 3 · REFUERZOS DE MADERA' },
  { key: '3', label: 'ETAPA 4 · FORRO 2DA CARA' },
  { key: '4', label: 'ETAPA 5 · CIELO Y FORRO' },
  { key: '5', label: 'ETAPA 6 · MASILLA + ENTREGA FINAL' }
];

// ── HELPERS ──
function showToast(msg, type){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 3500);
}
function showLogin(){
  document.getElementById('screenLogin').style.display = '';
  document.getElementById('screenRegister').style.display = 'none';
  document.getElementById('screenMain').style.display = 'none';
  document.getElementById('loginError').classList.remove('show');
}
function showRegister(){
  document.getElementById('screenLogin').style.display = 'none';
  document.getElementById('screenRegister').style.display = '';
  document.getElementById('screenMain').style.display = 'none';
  document.getElementById('registerError').classList.remove('show');
  document.getElementById('registerSuccess').classList.remove('show');
}
function showMain(){
  document.getElementById('screenLogin').style.display = 'none';
  document.getElementById('screenRegister').style.display = 'none';
  document.getElementById('screenMain').style.display = '';
}
function setError(elId, msg){
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.classList.add('show');
}
function clearError(elId){
  const el = document.getElementById(elId);
  el.classList.remove('show');
}
function closeModal(name){
  document.getElementById('modal' + name).classList.remove('show');
}

// ── LOGIN ──
async function doLogin(){
  clearError('loginError');
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { setError('loginError', 'Completá email y contraseña'); return; }
  try {
    showToast('Iniciando sesión...', '');
    await _clientesAuth.signInWithEmailAndPassword(email, password);
    // El onAuthStateChanged se encarga del resto
  } catch(e) {
    console.error('Login error:', e);
    let msg = 'Email o contraseña incorrectos';
    if (e.code === 'auth/user-not-found') msg = 'No existe cuenta con ese email';
    else if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = 'Contraseña incorrecta';
    else if (e.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Esperá unos minutos.';
    else if (e.code === 'auth/invalid-email') msg = 'Email inválido';
    setError('loginError', msg);
  }
}

// ── REGISTRO CON CÓDIGO ──
async function doRegister(){
  clearError('registerError');
  document.getElementById('registerSuccess').classList.remove('show');

  const code = document.getElementById('regCode').value.trim().toUpperCase();
  const email = document.getElementById('regEmail').value.trim().toLowerCase();
  const password = document.getElementById('regPassword').value;
  const password2 = document.getElementById('regPassword2').value;

  if (!code) return setError('registerError', 'Pegá tu código de invitación');
  if (!email) return setError('registerError', 'Email requerido');
  if (password.length < 6) return setError('registerError', 'La contraseña debe tener al menos 6 caracteres');
  if (password !== password2) return setError('registerError', 'Las contraseñas no coinciden');

  showToast('Validando código...', '');

  let cred = null;
  try {
    // 1. Validar el código leyendo el state (lectura pública/auth)
    const snap = await _clientesDb.collection('appState').doc('main').get();
    if (!snap.exists) return setError('registerError', 'No se pudo cargar la base de datos. Intentá de nuevo.');
    const remoteState = snap.data();
    const receptores = remoteState.receptores || [];
    const r = receptores.find(x => !x.deleted && x.inviteCode && x.inviteCode.toUpperCase() === code);
    if (!r) return setError('registerError', 'Código inválido. Pedile a Punto Rojo que te genere uno nuevo.');
    if (r.inviteCodeUsed) return setError('registerError', 'Este código ya fue usado. Pedile a Punto Rojo que te genere uno nuevo.');

    // 2. Crear cuenta en Firebase Auth (en el app aislado)
    showToast('Creando cuenta...', '');
    try {
      cred = await _clientesAuth.createUserWithEmailAndPassword(email, password);
    } catch(e) {
      console.error('Register error:', e);
      let msg = 'Error al crear la cuenta';
      if (e.code === 'auth/email-already-in-use') msg = 'Ese email ya está en uso. Intentá iniciar sesión normal.';
      else if (e.code === 'auth/invalid-email') msg = 'Email inválido';
      else if (e.code === 'auth/weak-password') msg = 'La contraseña es demasiado débil';
      return setError('registerError', msg);
    }

    // 3. Escribir registro a clientRegistrations/{uid}.
    //    Esta colección tiene reglas que permiten al usuario escribir SOLO
    //    su propio doc (request.auth.uid == uid). El admin la sincroniza
    //    a state.receptores cuando entra a la app interna.
    showToast('Vinculando cuenta...', '');
    try {
      await _clientesDb.collection('clientRegistrations').doc(cred.user.uid).set({
        receptorId: r.id,
        inviteCode: code,
        email: email,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        applied: false  // el admin lo marca true cuando lo sincroniza al state
      });
    } catch(eRules) {
      console.error('clientRegistrations write failed:', eRules);
      // Rollback: borrar el usuario de auth para que pueda reintentar
      try { await cred.user.delete(); } catch(e2){}
      return setError('registerError', 'Error de permisos al registrar. Avisale al admin para que actualice las reglas de Firestore. (' + (eRules.message || eRules.code) + ')');
    }

    // 4. Mostrar éxito. El onAuthStateChanged ya está activo y va a cargar el portal.
    const success = document.getElementById('registerSuccess');
    success.textContent = '✓ Cuenta creada con éxito. Cargando portal...';
    success.classList.add('show');
  } catch(e) {
    console.error(e);
    // Rollback si creamos el usuario antes del error
    if (cred && cred.user) { try { await cred.user.delete(); } catch(e2){} }
    setError('registerError', 'Error inesperado: ' + (e.message || e.code || 'desconocido'));
  }
}

// ── LOGOUT ──
async function doLogout(){
  try {
    if (_stateUnsubscribe) { _stateUnsubscribe(); _stateUnsubscribe = null; }
    state = null;
    currentReceptor = null;
    activeProjectId = null;
    await _clientesAuth.signOut();
    showLogin();
    showToast('Sesión cerrada', '');
  } catch(e) { console.error(e); }
}

/* clientReg cache: guarda el doc clientRegistrations/{uid} para no leerlo
   cada vez que cambia el state. Se setea en loadStateAndStart. */
let _clientRegistration = null;

// ── CARGA DE STATE ──
async function loadStateAndStart(){
  if (!currentUser) return;

  // 1. Leer clientRegistrations/{uid} para saber a qué receptor estoy vinculado
  try {
    const regSnap = await _clientesDb.collection('clientRegistrations').doc(currentUser.uid).get();
    if (regSnap.exists) {
      _clientRegistration = regSnap.data();
    } else {
      _clientRegistration = null;
    }
  } catch(e) {
    console.error('clientRegistrations read failed:', e);
    _clientRegistration = null;
  }

  // 2. Listener en tiempo real al state principal (lectura)
  const ref = _clientesDb.collection('appState').doc('main');
  _stateUnsubscribe = ref.onSnapshot(
    (snap) => {
      if (!snap.exists) {
        showToast('Sin datos disponibles. Contactá a Punto Rojo.', 'red');
        return;
      }
      state = snap.data();
      onStateLoaded();
    },
    (err) => {
      console.error('Firestore listener error:', err);
      showToast('Error de conexión: ' + (err.code || err.message), 'red');
    }
  );
}

function onStateLoaded(){
  if (!currentUser || !state) return;
  const receptores = state.receptores || [];
  const email = (currentUser.email || '').toLowerCase();

  // Buscar receptor por DOS rutas, en orden:
  //   1. clientRegistrations/{uid} → receptorId (más confiable, recién registrado)
  //   2. state.receptores[].clientLoginEmail === email (después que admin sincronice)
  currentReceptor = null;
  if (_clientRegistration && _clientRegistration.receptorId) {
    currentReceptor = receptores.find(r => !r.deleted && r.id === _clientRegistration.receptorId) || null;
  }
  if (!currentReceptor) {
    currentReceptor = receptores.find(r => !r.deleted && r.clientLoginEmail && r.clientLoginEmail.toLowerCase() === email) || null;
  }

  if (!currentReceptor) {
    // Caso: usuario logueado en Firebase pero sin receptor vinculado
    showToast('Tu cuenta no está vinculada a ningún receptor. Contactá a Punto Rojo.', 'red');
    setTimeout(() => doLogout(), 4000);
    return;
  }

  // Mostrar nombre
  document.getElementById('userName').textContent = currentReceptor.nombre || currentReceptor.cargo || email;
  document.getElementById('userRole').textContent = currentReceptor.isMaster ? '★ MASTER' : 'Receptor';

  // Filtrar proyectos asignados
  const assignedIds = new Set((currentReceptor.assignedProjectIds || []).map(String));
  const projects = (state.projects || []).filter(p => !p.archived && assignedIds.has(p.id));

  if (projects.length === 0) {
    document.getElementById('appContent').innerHTML =
      '<div class="empty"><div class="big">SIN PROYECTOS</div><p>Todavía no tenés proyectos asignados. Contactá a Punto Rojo para que te asigne uno.</p></div>';
    document.getElementById('kpis').innerHTML = '';
    document.getElementById('projectBar').style.display = 'none';
    showMain();
    return;
  }

  // Project selector
  const sel = document.getElementById('projectSelect');
  sel.innerHTML = projects.map(p => `<option value="${p.id}">${escapeHtml(p.name || '(sin nombre)')}</option>`).join('');
  if (!activeProjectId || !projects.find(p => p.id === activeProjectId)) {
    activeProjectId = projects[0].id;
  }
  sel.value = activeProjectId;
  document.getElementById('projectBar').style.display = projects.length > 1 ? '' : 'none';

  showMain();
  renderApp();
}

function onProjectChange(){
  activeProjectId = document.getElementById('projectSelect').value;
  renderApp();
}

function activeProj(){
  return (state.projects || []).find(p => p.id === activeProjectId) || null;
}

function escapeHtml(s){
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function getAcuseSlot(a, slotKey){
  if (!a || !a.acuseRecepciones) return null;
  return a.acuseRecepciones[slotKey] || null;
}
function getAcuseUrls(slot){
  if (!slot) return [];
  const out = [];
  if (Array.isArray(slot.urls)) {
    for (let i = 0; i < 2; i++) out[i] = slot.urls[i] || null;
  } else {
    out[0] = slot.url || slot.data || null;
    out[1] = null;
  }
  return out;
}
function isAcuseFirmado(slot){
  return !!(slot && (slot.receptorId || slot.receptorNombre));
}
function clienteVeAcuse(slot){
  // Si es master: ve TODOS los acuses firmados del proyecto
  // Si es regular: solo los acuses firmados POR ÉL
  if (!isAcuseFirmado(slot)) return true; // todos ven los pendientes (saben qué esperar)
  if (currentReceptor.isMaster) return true;
  if (slot.receptorId === currentReceptor.id) return true;
  return false;
}

// ── RENDER ──
function renderApp(){
  const p = activeProj();
  if (!p) return;

  // KPIs: total acuses + firmados + pendientes
  let totalAcuses = 0, firmados = 0, vistos = 0;
  (p.towers || []).forEach(t => (t.levels || []).forEach(l => (l.aptos || []).forEach(a => {
    ACUSE_SLOTS.forEach(s => {
      const slot = getAcuseSlot(a, s.key);
      if (!clienteVeAcuse(slot)) return; // no contamos los que no podemos ver
      vistos++;
      if (isAcuseFirmado(slot)) firmados++;
      totalAcuses++;
    });
  })));
  const pendientes = totalAcuses - firmados;
  const pct = totalAcuses > 0 ? Math.round(firmados / totalAcuses * 100) : 0;

  document.getElementById('kpis').innerHTML = `
    <div class="kpi green"><div class="lbl">Acuses Firmados</div><div class="val">${firmados}</div><div class="sub">de ${totalAcuses} totales</div></div>
    <div class="kpi amber"><div class="lbl">Pendientes</div><div class="val">${pendientes}</div><div class="sub">aún sin firmar</div></div>
    <div class="kpi"><div class="lbl">Avance</div><div class="val">${pct}%</div><div class="sub">del proyecto</div></div>
  `;

  // Listado de torres
  const cont = document.getElementById('appContent');
  if (!(p.towers || []).length) {
    cont.innerHTML = '<div class="empty"><div class="big">SIN TORRES</div><p>El proyecto todavía no tiene torres configuradas.</p></div>';
    return;
  }

  cont.innerHTML = (p.towers || []).map(t => {
    const totalT = (t.levels || []).reduce((s, l) => s + (l.aptos || []).length * ACUSE_SLOTS.length, 0);
    let firmT = 0;
    (t.levels || []).forEach(l => (l.aptos || []).forEach(a => ACUSE_SLOTS.forEach(s => {
      if (isAcuseFirmado(getAcuseSlot(a, s.key))) firmT++;
    })));
    const pctT = totalT > 0 ? Math.round(firmT / totalT * 100) : 0;
    return `<div class="tower-card" data-tid="${t.id}">
      <div class="tower-head" onclick="toggleTorre('${t.id}')">
        <span class="chev"></span>
        <div class="name">${escapeHtml(t.name || 'TORRE')}</div>
        <div class="pct">${pctT}%<small>FIRMADOS</small></div>
      </div>
      <div class="tower-body" style="display:none">
        ${(t.levels || []).map(l => renderLevel(t, l)).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderLevel(t, l){
  const total = (l.aptos || []).length * ACUSE_SLOTS.length;
  let firm = 0;
  (l.aptos || []).forEach(a => ACUSE_SLOTS.forEach(s => {
    if (isAcuseFirmado(getAcuseSlot(a, s.key))) firm++;
  }));
  const pct = total > 0 ? Math.round(firm / total * 100) : 0;
  return `<div class="level-card" data-lid="${l.id}">
    <div class="level-head" onclick="toggleLevel('${l.id}')">
      <span class="chev"></span>
      <div class="name">${escapeHtml(l.name || 'NIVEL')}</div>
      <div class="stat">${firm} / ${total} firmados · ${pct}%</div>
    </div>
    <div class="level-body" style="display:none">
      <div class="aptos-grid">
        ${(l.aptos || []).map(a => renderApto(t, l, a)).join('')}
      </div>
    </div>
  </div>`;
}

function renderApto(t, l, a){
  const rows = ACUSE_SLOTS.map(s => {
    const slot = getAcuseSlot(a, s.key);
    if (!clienteVeAcuse(slot)) return ''; // ocultar acuses firmados por otros si no es master
    const firmado = isAcuseFirmado(slot);
    const fechaFirma = firmado && (slot.signatureTs || slot.ts)
      ? new Date(slot.signatureTs || slot.ts).toLocaleDateString('es-GT', { day:'2-digit', month:'2-digit', year:'numeric' })
      : '';
    let actionBtn = '';
    if (firmado) {
      actionBtn = `<button class="btn ghost sm" onclick="abrirAcuse('${t.id}','${l.id}','${a.id}','${s.key}')">VER</button>`;
    }
    return `<div class="acuse-row">
      <div>
        <div class="acuse-label">${escapeHtml(s.label)}</div>
        <div class="acuse-status ${firmado ? 'firmado' : 'pendiente'}">${firmado ? '✓ Firmado · ' + (slot.receptorNombre || '') + ' · ' + fechaFirma : 'Pendiente de firma'}</div>
      </div>
      <div>${actionBtn}</div>
    </div>`;
  }).filter(Boolean).join('');

  if (!rows) {
    return `<div class="apto-card"><div class="apto-name">${escapeHtml(a.name || 'APTO')}</div><div class="apto-meta">Sin acuses visibles</div></div>`;
  }

  return `<div class="apto-card" data-aid="${a.id}">
    <div class="apto-name">${escapeHtml(a.name || 'APTO')}</div>
    <div class="apto-meta">Acuses de las 6 etapas</div>
    ${rows}
  </div>`;
}

window.toggleTorre = function(tid){
  const card = document.querySelector('.tower-card[data-tid="' + tid + '"]');
  if (!card) return;
  const head = card.querySelector('.tower-head');
  const body = card.querySelector('.tower-body');
  const open = head.classList.toggle('open');
  body.style.display = open ? '' : 'none';
};
window.toggleLevel = function(lid){
  const card = document.querySelector('.level-card[data-lid="' + lid + '"]');
  if (!card) return;
  const head = card.querySelector('.level-head');
  const body = card.querySelector('.level-body');
  const open = head.classList.toggle('open');
  body.style.display = open ? '' : 'none';
};

// ── DETALLE DE ACUSE ──
window.abrirAcuse = function(towerId, levelId, aptoId, slotKey){
  const p = activeProj();
  const t = (p.towers || []).find(x => x.id === towerId);
  const l = t && (t.levels || []).find(x => x.id === levelId);
  const a = l && (l.aptos || []).find(x => x.id === aptoId);
  const slot = a && getAcuseSlot(a, slotKey);
  if (!slot) return showToast('Acuse no encontrado', 'red');
  if (!clienteVeAcuse(slot)) return showToast('No tenés permiso para ver este acuse', 'red');

  _viewAcuseCtx = { towerId, levelId, aptoId, slotKey, projectName: p.name, towerName: t.name, levelName: l.name, aptoName: a.name };
  const sIdx = ACUSE_SLOTS.findIndex(s => s.key === String(slotKey));
  const etapaLabel = sIdx >= 0 ? ACUSE_SLOTS[sIdx].label : 'ETAPA ' + slotKey;

  document.getElementById('acuseTitle').textContent = etapaLabel;
  document.getElementById('acuseSubtitle').textContent = `${p.name} · ${t.name} · ${l.name} · ${a.name}`;

  const urls = getAcuseUrls(slot);
  const fotosHtml = `<div class="acuse-detail-fotos">
    ${urls[0] ? `<img src="${escapeHtml(urls[0])}" alt="Foto 1">` : '<div style="background:var(--cream);border:1px dashed var(--line);height:220px;display:flex;align-items:center;justify-content:center;color:var(--mute);font-size:11px">SIN FOTO 1</div>'}
    ${urls[1] ? `<img src="${escapeHtml(urls[1])}" alt="Foto 2">` : '<div style="background:var(--cream);border:1px dashed var(--line);height:220px;display:flex;align-items:center;justify-content:center;color:var(--mute);font-size:11px">SIN FOTO 2</div>'}
  </div>`;

  const firmaUrl = slot.receptorSignatureUrl || slot.signatureImageUrl || '';
  const firmaHtml = firmaUrl
    ? `<div class="acuse-detail-firma">
        <strong style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute)">FIRMA DIGITAL</strong>
        <img src="${escapeHtml(firmaUrl)}" alt="Firma">
       </div>`
    : '';

  const fechaFirma = slot.signatureTs || slot.ts ? new Date(slot.signatureTs || slot.ts).toLocaleString('es-GT') : '—';

  const metaHtml = `<dl class="acuse-detail-meta">
    <dt>Receptor</dt><dd>${escapeHtml(slot.receptorNombre || '—')}</dd>
    ${slot.receptorCargo ? `<dt>Cargo</dt><dd>${escapeHtml(slot.receptorCargo)}</dd>` : ''}
    <dt>Fecha de firma</dt><dd>${fechaFirma}</dd>
    ${slot.signedBy ? `<dt>Subido por</dt><dd>${escapeHtml(slot.signedBy)}</dd>` : ''}
  </dl>`;

  document.getElementById('acuseBody').innerHTML = fotosHtml + firmaHtml + metaHtml;
  document.getElementById('modalAcuse').classList.add('show');
};

// ── DESCARGA PDF (basada en la del app interna, simplificada) ──
async function _cargarImagen(url){
  return new Promise(resolve => {
    if (!url) return resolve(null);
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const c = document.createElement('canvas');
        c.width = img.naturalWidth;
        c.height = img.naturalHeight;
        c.getContext('2d').drawImage(img, 0, 0);
        resolve({ dataUrl: c.toDataURL('image/jpeg', 0.85), w: c.width, h: c.height });
      } catch(e) { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

window.descargarAcusePDF = async function(){
  const ctx = _viewAcuseCtx;
  if (!ctx) return showToast('Sin datos del acuse', 'red');
  if (typeof window.jspdf === 'undefined' || !window.jspdf.jsPDF) return showToast('jsPDF no cargó. Recargá la página.', 'red');

  const p = activeProj();
  const t = (p.towers || []).find(x => x.id === ctx.towerId);
  const l = t && (t.levels || []).find(x => x.id === ctx.levelId);
  const a = l && (l.aptos || []).find(x => x.id === ctx.aptoId);
  const slot = a && getAcuseSlot(a, ctx.slotKey);
  if (!slot) return showToast('Acuse no encontrado', 'red');

  showToast('Generando PDF...', '');

  const sIdx = ACUSE_SLOTS.findIndex(s => s.key === String(ctx.slotKey));
  const etapaLabel = sIdx >= 0 ? ACUSE_SLOTS[sIdx].label : 'ETAPA ' + ctx.slotKey;
  const urls = getAcuseUrls(slot);
  const firmaUrl = slot.receptorSignatureUrl || slot.signatureImageUrl || '';

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'pt', format: 'a4', orientation: 'portrait' });
    const ROJO = [200, 20, 28];
    const GRIS = [80, 80, 80];
    const CREMA = [250, 247, 242];
    const NEGRO = [30, 30, 30];
    const pageW = doc.internal.pageSize.width;

    // Header rojo
    doc.setFillColor(...ROJO);
    doc.rect(0, 0, pageW, 70, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text('ACUSE DE RECEPCIÓN', 50, 32);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text(p.name || '', 50, 52);
    doc.text((p.client || '—') + ' · ' + (p.location || '—'), pageW - 50, 52, { align: 'right' });

    let yc = 100;
    doc.setTextColor(...NEGRO);

    // Datos
    doc.autoTable({
      startY: yc,
      body: [
        ['Torre', t.name || ''],
        ['Nivel', l.name || ''],
        ['Apartamento / Espacio', a.name || ''],
        ['Etapa entregada', etapaLabel]
      ],
      margin: { left: 50, right: 50 },
      styles: { fontSize: 10, cellPadding: 6 },
      columnStyles: { 0: { fontStyle: 'bold', cellWidth: 160, fillColor: CREMA }, 1: { cellWidth: 'auto' } },
      theme: 'grid'
    });
    yc = doc.lastAutoTable.finalY + 16;

    // Fotos
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...ROJO);
    doc.text('EVIDENCIA FOTOGRÁFICA · 2 FOTOS', 50, yc);
    yc += 6;

    const validFotos = urls.filter(Boolean).slice(0, 2);
    if (validFotos.length > 0) {
      const imgs = await Promise.all(validFotos.map(u => _cargarImagen(u)));
      const validas = imgs.filter(Boolean);
      const margen = 50, gap = 12;
      const cellW = (pageW - margen * 2 - gap) / 2;
      const cellH = 200;
      const baseY = yc + 6;
      validas.forEach((img, idx) => {
        let w = cellW, h = (img.h / img.w) * cellW;
        if (h > cellH) { h = cellH; w = (img.w / img.h) * cellH; }
        const cellX = margen + idx * (cellW + gap);
        const x = cellX + (cellW - w) / 2;
        const y = baseY + (cellH - h) / 2;
        doc.setDrawColor(220, 220, 220);
        doc.rect(cellX, baseY, cellW, cellH);
        doc.addImage(img.dataUrl, 'JPEG', x, y, w, h, undefined, 'FAST');
        doc.setFontSize(8);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...GRIS);
        doc.text(`FOTO ${idx + 1}`, cellX + cellW / 2, baseY + cellH + 12, { align: 'center' });
      });
      yc = baseY + cellH + 22;
    } else {
      doc.setFontSize(9);
      doc.setFont('helvetica', 'italic');
      doc.setTextColor(...GRIS);
      doc.text('Sin fotos registradas.', 50, yc + 18);
      yc += 30;
    }

    // Firma
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...ROJO);
    doc.text('FIRMA DIGITAL DEL RECEPTOR', 50, yc);
    yc += 14;

    if (firmaUrl) {
      try {
        const firmaImg = await _cargarImagen(firmaUrl);
        if (firmaImg) {
          let fw = 180, fh = (firmaImg.h / firmaImg.w) * fw;
          if (fh > 60) { fh = 60; fw = (firmaImg.w / firmaImg.h) * fh; }
          doc.setDrawColor(220, 220, 220);
          doc.setFillColor(255, 255, 255);
          doc.rect(50, yc, 220, 80, 'FD');
          doc.addImage(firmaImg.dataUrl, 'JPEG', 50 + (220 - fw) / 2, yc + (80 - fh) / 2, fw, fh, undefined, 'FAST');
          yc += 90;
        }
      } catch(e) { console.warn(e); }
    } else {
      doc.setFontSize(9);
      doc.setFont('helvetica', 'italic');
      doc.setTextColor(...GRIS);
      doc.text('Sin firma registrada.', 50, yc + 6);
      yc += 18;
    }

    // Datos del receptor
    const fechaFirma = slot.signatureTs || slot.ts ? new Date(slot.signatureTs || slot.ts).toLocaleString('es-GT') : '—';
    doc.autoTable({
      startY: yc,
      body: [
        ['Receptor', slot.receptorNombre || '—'],
        ['Cargo', slot.receptorCargo || '—'],
        ['Fecha de firma', fechaFirma]
      ],
      margin: { left: 50, right: 50 },
      styles: { fontSize: 9, cellPadding: 5 },
      columnStyles: { 0: { fontStyle: 'bold', cellWidth: 120, fillColor: CREMA }, 1: { cellWidth: 'auto' } },
      theme: 'grid'
    });

    // Footer
    const pageH = doc.internal.pageSize.height;
    doc.setFontSize(8);
    doc.setFont('helvetica', 'italic');
    doc.setTextColor(...GRIS);
    doc.text('Generado por Punto Rojo · Portal Cliente · ' + new Date().toLocaleString('es-GT'), pageW / 2, pageH - 30, { align: 'center' });

    const filename = `Acuse_${(p.name || 'proyecto').replace(/\s+/g, '_')}_${(t.name || 'torre').replace(/\s+/g, '_')}_${(a.name || 'apto').replace(/\s+/g, '_')}_E${parseInt(ctx.slotKey, 10) + 1}.pdf`;
    doc.save(filename);
    showToast('PDF descargado', 'green');
  } catch(e) {
    console.error('Error PDF:', e);
    showToast('Error al generar PDF: ' + (e.message || e), 'red');
  }
};

// ── AUTH STATE LISTENER (en app aislado, no toca la sesión de la app interna) ──
_clientesAuth.onAuthStateChanged((user) => {
  currentUser = user;
  if (user) {
    showToast('Sesión activa: ' + user.email, 'green');
    loadStateAndStart();
  } else {
    showLogin();
  }
});

// Auto-uppercase del código de invitación
document.getElementById('regCode').addEventListener('input', (e) => {
  e.target.value = e.target.value.toUpperCase();
});
</script>

<!-- Service Worker (mismo de la app principal — comparte cache logic) -->
<script>
(function(){
  if (!('serviceWorker' in navigator)) return;
  if (location.protocol !== 'http:' && location.protocol !== 'https:') return;
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
      .then(function(reg){ try { reg.update(); } catch(e){} })
      .catch(function(err){ console.warn('SW falló:', err); });
    var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  });
})();
</script>
